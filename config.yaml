    ip: "10.1.101.10"
    port: 4444
    priority: high
  - name: "Medium Priority AWS"
    ip: "10.1.101.10"
    port: 3333
    priority: medium
  - name: "Low Priority AWS"
    ip: "10.1.101.10"
    port: 2222
    priority: low
  - name: "Best Effort Priority AWS"
    ip: "10.1.101.10"
    port: 1111
